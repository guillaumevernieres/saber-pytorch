# Vertical salinity emulator — Salt(z) from Temp(z)
#
# Predicts salinity on a reduced vertical grid from source-grid temperature.
# Training data is derived from the WOA23 annual climatology rather than
# from model background fields.  TorchBalance still supplies source-grid
# Temp and h at runtime.  h is layer thickness; source mid-layer depth is
# cumsum(h) - 0.5*h.  Levels with h <= 0.1 m are dropped before
# interpolation so lower fill regions are not sampled.
# A Conv1d front-end captures vertical structure before the MLP.
# Domain: all valid ocean points (no ice filtering).
#
# Typical workflow:
#   python scripts/prepare_woa_training_data.py \
#       --woa-file  /path/to/woa23_B5C2_st00_01.nc \
#       --model-depth-file  /path/to/MOM.res.nc \
#       --config    emulators/salinity_profile/config.yaml \
#       --output    data/salt_profile_training_woa.npz
#
#   python scripts/train_ml_balance.py \
#       --config emulators/salinity_profile/config.yaml \
#       --data-path data/salt_profile_training_woa.npz
#
#   python scripts/build_vertical_ml_balance_emulator.py \
#       --checkpoint models_salt_profile/best_model.pt \
#       --output vertical_ml_balance_salt_profile.ts

model:
  emulator_type: salinity_profile
  hidden_size: 128
  hidden_layers: 4
  activation: gelu
  use_conv1d: true
  conv_channels: 32
  conv_kernel_size: 5

variables:
  input_variables:
    - sea_water_potential_temperature
    - sea_water_cell_thickness
  output_variables:
    - sea_water_salinity
  num_levels: 75
  target_num_levels: 50
  reduced_grid:
    # uniform_depth preserves the original evenly spaced depth reduction.
    # temperature_gradient clusters reduced levels near large |dT/dz| features.
    # gradient_weight controls how strongly temperature gradients stretch the
    # sampling metric: 0.0 behaves like uniform_depth; 1-3 is mild; 5-10 is
    # visibly adaptive; larger values concentrate more levels near the
    # strongest thermocline-like features in each column.
    method: temperature_gradient
    gradient_weight: 10.0

domain:
  mask_mode: ocean           # train on all valid ocean points
  min_ice_concentration: 0.15

data:
  data_path: data/salt_profile_training_woa.npz
  validation_split: 0.1
  num_workers: 0
  max_patterns: 500000
  thin_fraction: 1.0

training:
  epochs: 10000
  batch_size: 2048
  optimizer:
    type: adam
    learning_rate: 0.0001
    weight_decay: 0.0001
  scheduler: null
  loss_function: mse
  regularization:
    vertical_smoothness:
      enabled: false
      weight: 0.1
      order: 2
  early_stopping_patience: 100
  convergence_threshold: 1e-12
  save_interval: 50
  track_jacobian: false
  use_log_scale_loss: false

output:
  model_dir: models_salt_profile/

use_cuda: false
