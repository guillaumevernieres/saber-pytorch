# Vertical salinity emulator — Salt(z) from Temp(z)
#
# Predicts salinity on a reduced vertical grid from source-grid temperature.
# TorchBalance still supplies source-grid Temp and h.  h is layer thickness;
# source mid-layer depth is cumsum(h) - 0.5*h.  Levels with h <= 0.1 m are dropped
# before interpolation so lower fill regions are not sampled.
# A Conv1d front-end captures vertical structure before the MLP.
# Domain: all valid ocean points (no ice filtering).
#
# Typical workflow:
#   python scripts/prepare_training_data.py \
#       --config emulators/salinity_profile/config.yaml \
#       --ocn path/to/ocean.nc \
#       --output data/salt_profile_training.npz
#
#   python scripts/train_ml_balance.py --config emulators/salinity_profile/config.yaml \
#       --data-path data/salt_profile_training.npz
#
#   python scripts/build_vertical_ml_balance_emulator.py \
#       --checkpoint models_salt_profile/best_model.pt \
#       --output vertical_ml_balance_salt_profile.ts

model:
  emulator_type: salinity_profile
  hidden_size: 256
  hidden_layers: 4
  activation: gelu
  use_conv1d: true
  conv_channels: 32
  conv_kernel_size: 5        # spans ±2 levels, captures local vertical structure

variables:
  input_variables:
    - Temp     # MOM6/UFS ocean potential temperature profile (3D)
    - h        # MOM6 layer thickness used as the source vertical coordinate (3D)
  output_variables:
    - Salt     # MOM6/UFS ocean salinity profile on the reduced grid
  num_levels: 50             # source vertical levels passed by TorchBalance
  target_num_levels: 30      # reduced levels used by the FFNN and salinity output

domain:
  mask_mode: ocean           # train on all valid ocean points
  min_ice_concentration: 0.15

data:
  data_path: data/salt_profile_training.npz
  validation_split: 0.1
  num_workers: 0
  max_patterns: 500000
  thin_fraction: 1.0

training:
  epochs: 100000
  batch_size: 2048
  optimizer:
    type: adam
    learning_rate: 0.0001
    weight_decay: 0.0001
  scheduler: null
  loss_function: mse
  early_stopping_patience: 100
  save_interval: 50
  track_jacobian: false
  use_log_scale_loss: false

output:
  model_dir: models_salt_profile/

use_cuda: false
