# Example salinity-profile emulator config for:
#   ../i-jedi/test-soca/geom100/MOM.res.nc
#
# MOM.res.nc contains Temp, Salt, and h on 75 MOM6 layers.  The emulator
# receives source-grid Temp and h at runtime, drops layers with h <= 0.1 m,
# interpolates Temp to target_num_levels, and predicts Salt on that same
# reduced grid.

model:
  emulator_type: salinity_profile
  hidden_size: 256
  hidden_layers: 4
  activation: gelu
  use_conv1d: true
  conv_channels: 32
  conv_kernel_size: 5

variables:
  input_variables:
    - Temp
    - h
  output_variables:
    - Salt
  num_levels: 75
  target_num_levels: 30

domain:
  mask_mode: ocean
  min_ice_concentration: 0.15

data:
  data_path: data/salt_profile_geom100_training.npz
  validation_split: 0.1
  num_workers: 0
  max_patterns: 500000
  thin_fraction: 1.0

training:
  epochs: 10000
  batch_size: 2048
  optimizer:
    type: adam
    learning_rate: 0.0001
    weight_decay: 0.0001
  scheduler: null
  loss_function: mse
  early_stopping_patience: 100
  save_interval: 50
  track_jacobian: false
  use_log_scale_loss: false

output:
  model_dir: models_salt_profile_geom100/

use_cuda: false
